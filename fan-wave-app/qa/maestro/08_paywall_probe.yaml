appId: org.fansphere.app
name: "D6 — Paywall probe (Premium + Soccer Cup Pass)"
tags:
  - day6
  - paywall
  - iap
  - v82
---
# Sign in → Profile → Subscription → tap Premium → reach paywall sheet →
# tap Annual → reach Apple/Google purchase dialog → CANCEL. Also probe
# the Soccer Cup Pass paywall path. Fires: screen_viewed (paywall_premium, paywall_wc_pass),
# plus a purchase_events row from RC sandbox for each surfaced product.
#
# CRITICAL: this scenario must NEVER complete a real-money purchase.
# Always cancel at the Google Play purchase dialog.

- launchApp:
    clearState: false
    stopApp: true

- runFlow: flows/_sign_in.yaml

- tapOn:
    text: "Profile"

# ─── v8.2 fix #2 — paywall entry point is discoverable ─────────────
# Agent A added a Subscription menu row on the Profile tab with a
# dynamic badge so free users see "Free · Upgrade" instead of just
# the silent menu row. Pre-v8.2 a fresh sign-in had no in-app path to
# the PremiumPaywall / WCPassPaywall components, so users couldn't
# actually buy what they came for. The row label + free-user badge
# string both come from app/(tabs)/profile.tsx ~L201-211.
- assertVisible:
    text: "Subscription"

# The badge is one of: "Free · Upgrade" (no entitlements),
# "Trial" / "Premium" (Premium active), or "Soccer Cup Pass" (WC pass
# only). For the QA tester (no real-money purchases) the expected
# badge is "Free · Upgrade". Match loosely so a tester with an active
# RC sandbox trial doesn't false-fail this assertion.
- assertVisible:
    text: ".*Free.*Upgrade.*|Trial|Premium|Soccer Cup Pass"

- takeScreenshot: screenshots/v82_paywall_entry_point

- tapOn:
    text: "Subscription"

- extendedWaitUntil:
    visible:
      text: ".*Fan Sphere Premium.*|.*Choose.*Plan.*|.*Premium.*"
    timeout: 15000

- takeScreenshot: screenshots/01_premium_paywall

# ─── Tap the Annual plan card ──────────────────────────────────────
- tapOn:
    text: "Annual"
    optional: true
- tapOn:
    text: "107.88"
    optional: true

- takeScreenshot: screenshots/02_annual_selected

# ─── Tap "Start 7-Day Free Trial" CTA ──────────────────────────────
- tapOn:
    text: "Start 7-Day Free Trial"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Subscribe"
    optional: true

- takeScreenshot: screenshots/03_purchase_dialog

# CRITICAL: cancel before any real charge. Google Play purchase dialog
# typically has a "Cancel" button or you can press Back.
- pressKey: "Back"

- takeScreenshot: screenshots/04_dialog_cancelled

# Close the Premium paywall
- tapOn:
    id: "close-paywall"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- pressKey: "Back"

# ─── Soccer Cup Pass paywall (if surfaced separately) ──────────────────────
- tapOn:
    text: "Soccer Cup"
- tapOn:
    text: ".*[Pp]ass.*"
    optional: true
- tapOn:
    text: "Buy"
    optional: true
- tapOn:
    text: "Get Pass"
    optional: true
- tapOn:
    text: "Unlock"
    optional: true

- extendedWaitUntil:
    visible:
      text: ".*Soccer Cup.*[Pp]ass.*"
    timeout: 10000
    optional: true

- takeScreenshot: screenshots/05_wc_paywall

- tapOn:
    text: "19.99"
    optional: true
- tapOn:
    text: ".*[Bb]uy.*"
    optional: true

- takeScreenshot: screenshots/06_wc_purchase_dialog

# CRITICAL: cancel again
- pressKey: "Back"

- takeScreenshot: screenshots/07_wc_cancelled

- pressKey: "Back"
