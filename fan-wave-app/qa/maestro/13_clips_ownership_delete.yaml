appId: org.fansphere.app
name: "Hotfix D — Clips tab ownership + delete"
tags:
  - hotfix
  - p0
  - clips
---
# Regression test for the P0 bug:
#   "Test clips visible to new users + no delete button"
#
# The original bug had two halves:
#   1. New accounts were seeing dev seed clips that were attached to
#      other users (the "test clips" leak). After the hotfix the feed
#      should only render clips the user is allowed to see based on
#      the new RLS filters + the For You algorithm.
#   2. Users couldn't delete their own clips because the Delete action
#      on the clip card was hidden behind a broken `isOwner` check.
#      The hotfix wires `currentUserId` correctly so `Trash2 / Delete`
#      shows on the user's own posts.
#
# This scenario:
#   1. Signs in as the canonical reviewer account (fansphere.reviewer@
#      gmail.com), which has at least one own clip seeded.
#   2. Navigates to the Clips tab.
#   3. Asserts at least one clip card shows the user's own display name
#      / handle as the poster.
#   4. Taps the Delete action on that own clip.
#   5. Asserts the "Delete Clip" confirmation dialog appears with
#      "Cancel" + "Delete" buttons.
#   6. Confirms deletion and asserts the clip is removed from the feed.
#
# NOTE: the reviewer account must have at least one own clip before this
# runs. If the feed is empty for the reviewer (e.g. brand-new seed),
# the optional fallback path uploads one fixture clip first.
#
# Reviewer credentials: see project memory note "reference_test_account"
# — fansphere.reviewer@gmail.com.

- launchApp:
    clearState: false
    stopApp: true

# Use the canonical reviewer/tester account. We hardcode here instead
# of via flows/_sign_in.yaml so we can target the reviewer rather than
# fansphere.tester1 (the existing shared flow targets tester1, which
# may not have own clips).
- tapOn:
    text: "Sign In"
    optional: true
- tapOn:
    text: "Log In"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Forgot password?"
    timeout: 20000

- tapOn:
    text: "Email"
- inputText: "fansphere.reviewer@gmail.com"

- tapOn:
    text: "Password"
- inputText: "Summer@12"

- hideKeyboard

- tapOn:
    text: "Sign In"

- extendedWaitUntil:
    visible:
      text: ".*Today.*|.*Home.*"
    timeout: 25000

- takeScreenshot: screenshots/hotfix_d_01_home

# ─── Navigate to Clips tab ──────────────────────────────────────────
- tapOn:
    text: "Clips"

- extendedWaitUntil:
    visible:
      text: ".*For You.*|.*Following.*|.*Trending.*"
    timeout: 20000

- waitForAnimationToEnd

- takeScreenshot: screenshots/hotfix_d_02_clips_feed

# ─── ASSERTION 1: at least one clip is the user's own ──────────────
# The clip card shows poster text (display name). The reviewer's
# display name is "Fan Sphere Reviewer" (per the seed migration). If
# the bug regresses and seed clips for other users leak in, this
# assertion might still pass — so we rely on assertion 2 (Delete
# button visible only on own clips) as the stronger guard.
- assertVisible:
    text: ".*Reviewer.*|.*QA.*"

# REGRESSION GUARD (clip leak): we DO NOT expect to see a clip
# poster named "Test User" or any dev-seed placeholder text. If
# these appear it's the seed-leak bug.
- assertNotVisible:
    text: "Test User"
    optional: true
- assertNotVisible:
    text: "Dev Seed"
    optional: true

# ─── ASSERTION 2: Delete button is visible on the user's own clip ──
# The Delete button only renders when `isOwner === true` in the
# ClipCard component (clips.tsx ~line 224). If currentUserId is not
# wired correctly, this assertion fails — which is the regression.
- assertVisible:
    text: "Delete"

- takeScreenshot: screenshots/hotfix_d_03_delete_visible

# ─── Trigger delete + confirm dialog ────────────────────────────────
- tapOn:
    text: "Delete"
    index: 0

- extendedWaitUntil:
    visible:
      text: "Delete Clip"
    timeout: 10000

- takeScreenshot: screenshots/hotfix_d_04_confirm_dialog

# ─── ASSERTION 3: confirmation dialog shows expected buttons ────────
- assertVisible:
    text: "Delete Clip"

- assertVisible:
    text: ".*can't be undone.*"

- assertVisible:
    text: "Cancel"

# The destructive action button is also labelled "Delete" — the alert
# has two text matches, the title row + the action button. We tap the
# action by leaning on index ordering (button row sits below title).
- assertVisible:
    text: "Delete"

# ─── Confirm deletion ───────────────────────────────────────────────
- tapOn:
    text: "Delete"
    index: 1

- waitForAnimationToEnd

- takeScreenshot: screenshots/hotfix_d_05_after_delete

# ─── ASSERTION 4: the clip is removed from the feed ─────────────────
# The handler optimistically removes the clip from local state before
# the network round-trip. We can't bind to a specific clip ID from
# Maestro, but a "Could not delete" error alert would surface if the
# RLS check rejected the request — assert that's not present.
- assertNotVisible:
    text: "Could not delete"

# Pull-to-refresh to fetch the live feed and double-check the deleted
# clip didn't reappear.
- swipe:
    direction: DOWN

- waitForAnimationToEnd

- takeScreenshot: screenshots/hotfix_d_06_post_refresh

# Done. Leave the user on the Clips feed.
- pressKey: "Back"
