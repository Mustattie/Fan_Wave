appId: org.fansphere.app
name: "D3 — Soccer Cup tab deep dive"
tags:
  - day3
  - world_cup
  - v82
---
# Sign in → Soccer Cup tab → browse match schedule → tap into a match →
# view bracket → join a WC-themed fan group → browse WC watch parties.
# Fires: screen_viewed (world_cup, match_detail, bracket, wc_watch_parties),
# group_joined (WC group).

- launchApp:
    clearState: false
    stopApp: true

- runFlow: flows/_sign_in.yaml

- tapOn:
    text: "Soccer Cup"

- extendedWaitUntil:
    visible:
      text: ".*2026.*"
    timeout: 15000

- takeScreenshot: screenshots/01_world_cup_landing

# ─── Browse match schedule ─────────────────────────────────────────
- swipe:
    direction: UP

- takeScreenshot: screenshots/02_schedule_scrolled

# Tap into a specific match
- tapOn:
    text: ".*vs.*"
    index: 0
    optional: true
- tapOn:
    text: ".*[Mm]atch.*"
    index: 0
    optional: true

- takeScreenshot: screenshots/03_match_detail

- pressKey: "Back"

# Second match
- tapOn:
    text: ".*vs.*"
    index: 1
    optional: true

- takeScreenshot: screenshots/04_match_detail_2

- pressKey: "Back"

# ─── View bracket / standings ──────────────────────────────────────
- tapOn:
    text: "Bracket"
    optional: true
- tapOn:
    text: "Standings"
    optional: true
- tapOn:
    text: "Groups"
    optional: true   # group stage table — different from fan groups

- takeScreenshot: screenshots/05_bracket_or_standings

# ─── Join a WC-themed fan group from this tab ──────────────────────
- tapOn:
    text: ".*[Ff]an.*[Gg]roups.*"
    optional: true
- tapOn:
    text: ".*England.*"
    optional: true
    index: 0
- tapOn:
    text: "Join"
    optional: true
    index: 0

- takeScreenshot: screenshots/06_wc_group_joined

# ─── Browse WC-specific watch parties ──────────────────────────────
- tapOn:
    text: ".*[Ww]atch.*[Pp]art.*"
    optional: true

- takeScreenshot: screenshots/07_wc_watch_parties

# Return to WC tab landing
- pressKey: "Back"
- pressKey: "Back"
- takeScreenshot: screenshots/08_back_at_world_cup

# ─── v8.2 fix #7 — sport-aware moment chips for WC groups ──────────
# Open a WC fan group (group_type='worldcup') and assert the moment-
# type chips read soccer labels ("Goal", "Save"), NOT the NFL default
# ("Field Goal", "Touchdown") that pre-v8.2 leaked through when the
# mapper failed to detect the group_type. See lib/mappers.ts ~L240 +
# components/MomentsFeed.tsx getMomentTypesForSport(). The chips live
# in the Highlights / Moments composer, surfaced when tapping +/Post.
- tapOn:
    text: ".*[Ff]an.*[Gg]roups.*"
    optional: true
- tapOn:
    text: ".*England.*"
    optional: true
    index: 0

- extendedWaitUntil:
    visible:
      text: ".*[Hh]ighlight.*|.*[Mm]oment.*|.*[Cc]hat.*"
    timeout: 10000

- tapOn:
    text: "Highlights"
    optional: true
- tapOn:
    text: "Moments"
    optional: true

- tapOn:
    text: "Post"
    optional: true
- tapOn:
    text: "+"
    optional: true

- takeScreenshot: screenshots/v82_09_wc_moment_composer

- assertVisible:
    text: "Goal"

- assertVisible:
    text: "Save"

- assertNotVisible:
    text: "Field Goal"

- assertNotVisible:
    text: "Touchdown"

# ─── v8.2 fix #5 — posted moments persist (auto-join before INSERT)
# Post a moment as a visitor / non-member. The v8.2 fix in
# MomentsFeed.tsx auto-joins the chat room before the INSERT so the
# match_moments RLS check passes. Pre-v8.2 the row never landed and
# the moment "disappeared" silently from the feed.
- tapOn:
    text: "Goal"
    index: 0

- tapOn:
    text: "Comment"
    optional: true
- tapOn:
    text: ".*[Aa]dd.*[Cc]omment.*"
    optional: true

- inputText: "QA v8.2 — sport-aware moment + auto-join"
    optional: true

- hideKeyboard

- tapOn:
    text: "Post"
    optional: true
- tapOn:
    text: "Submit"
    optional: true
- tapOn:
    text: "Share"
    optional: true

- waitForAnimationToEnd

- takeScreenshot: screenshots/v82_10_wc_moment_posted

# Tab-switch persistence: jump to Home, then back to Soccer Cup →
# back into the same group → assert the posted comment is still
# rendered. The v8.2 auto-join means the moment lands server-side,
# so a tab round-trip re-fetches it from the DB.
- tapOn:
    text: "Home"

- waitForAnimationToEnd

- tapOn:
    text: "Soccer Cup"

- tapOn:
    text: ".*[Ff]an.*[Gg]roups.*"
    optional: true
- tapOn:
    text: ".*England.*"
    optional: true
    index: 0

- extendedWaitUntil:
    visible:
      text: ".*QA v8.2.*|.*sport-aware.*"
    timeout: 15000
    optional: true

- takeScreenshot: screenshots/v82_11_moment_persists_after_tab_switch

- pressKey: "Back"
