appId: org.fansphere.app
name: "D0b — Post-sign-in tab crash regression"
tags:
  - smoke
  - tab_regression
  - v9_0
---
# Taps every bottom tab post-sign-in and asserts the root ErrorBoundary
# never renders. Would have caught the v8.3 Soccer Cup "Cannot read
# property 'replace' of null" crash — that bug shipped because no
# scenario exercised every tab end-to-end post-sign-in.
#
# v9.0 tab set (5 tabs): Home / Discover / Game Day / Clips / Profile.
# Soccer Cup + Groups tabs were removed in the v9.0 pivot (Groups
# folded into Discover; Game Day replaces the standalone WC tab).
#
# Run this against every APK BEFORE handing it to UAT. It's fast
# (~45s) and catches the most common regression class: a render-tree
# crash on a freshly opened tab.

- launchApp:
    clearState: false
    stopApp: true

- runFlow: flows/_sign_in.yaml

# Home — first tab the app lands on. Confirm the user got there.
- assertVisible:
    text: ".*Home.*|.*Today.*|.*Watch Parties.*"
- assertNotVisible:
    text: "Something went wrong"
- takeScreenshot: screenshots/v90_smoke_01_home

# Discover — now hosts the Fan Groups carousel folded in from the
# removed Groups tab (v9.0).
- tapOn:
    text: "Discover"
- waitForAnimationToEnd
- assertNotVisible:
    text: "Something went wrong"
- takeScreenshot: screenshots/v90_smoke_02_discover

# Game Day — v9.0 replacement for the removed Soccer Cup tab.
# Multi-sport live/upcoming/final scoreboard. The v8.3 stage.replace
# crash class lived in the old WC tab; Game Day is a clean rewrite,
# so this guards the new render path.
- tapOn:
    text: "Game Day"
- waitForAnimationToEnd
- assertNotVisible:
    text: "Something went wrong"
- takeScreenshot: screenshots/v90_smoke_03_game_day

# Clips — the v8.3 P0 5-second native crash would surface here after
# a brief wait. Pause to let autoplay-on-visible exercise the player.
- tapOn:
    text: "Clips"
- waitForAnimationToEnd
- assertNotVisible:
    text: "Something went wrong"
# Hold for 6 seconds. v8.3 force-closed the app around the 5-second
# mark on Clips tab. If v9.0 stayed open through this, the
# removeClippedSubviews + stable-player fix still holds.
- waitForAnimationToEnd:
    timeout: 6000
- assertNotVisible:
    text: "Something went wrong"
- takeScreenshot: screenshots/v90_smoke_04_clips_after_6s

# Profile — reads users.avatar_url via expo-image. v8.4 made avatar
# rendering URL-cache-friendly via UUID paths.
- tapOn:
    text: "Profile"
- waitForAnimationToEnd
- assertNotVisible:
    text: "Something went wrong"
- takeScreenshot: screenshots/v90_smoke_05_profile

# Final round-trip: tap back to Clips. v8.4 added focusEpoch so
# paused players resume on tab focus. The "frozen on return" symptom
# would manifest here. We can't directly assert "video is playing"
# in Maestro, but we CAN assert the tab renders without the error
# boundary, which is the regression we're actually guarding against.
- tapOn:
    text: "Clips"
- waitForAnimationToEnd
- assertNotVisible:
    text: "Something went wrong"
- takeScreenshot: screenshots/v90_smoke_06_clips_after_round_trip
